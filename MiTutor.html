<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Mi Tutor</title>

  <!-- ── iOS PWA meta tags ─────────────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mi Tutor">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">

  <!-- ── PWA manifest (inline) ─────────────────────────────────────── -->
  <script>
    const manifest = {
      name: "Mi Tutor — Spanish Coach",
      short_name: "Mi Tutor",
      description: "Your personal A1/A2 Spanish learning companion",
      start_url: ".",
      display: "standalone",
      orientation: "portrait",
      background_color: "#ffffff",
      theme_color: "#ffffff",
      icons: [
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='%232264b8'/><text x='96' y='130' font-size='100' text-anchor='middle'>🇪🇸</text></svg>", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%232264b8'/><text x='256' y='340' font-size='260' text-anchor='middle'>🇪🇸</text></svg>", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = url;
    document.head.appendChild(link);
  </script>

  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: #f7f7f8; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1c1c1e;
      overscroll-behavior: none;
    }
    input, textarea, button { font-family: inherit; font-size: inherit; border: none; outline: none; background: none; }
    button { cursor: pointer; }
    textarea { resize: none; }

    /* ── CSS variables ─────────────────────────────────────────────── */
    :root {
      --bg: #f7f7f8;
      --bg-alt: #efefef;
      --surface: #ffffff;
      --card: #ffffff;
      --border: #e4e4e7;
      --border-mid: #d1d1d6;
      --ink: #1c1c1e;
      --ink-mid: #48484a;
      --muted: #8e8e93;
      --subtle: #e5e5ea;
      --blue: #2264b8;
      --blue-s: rgba(34,100,184,0.09);
      --green: #2d8653;
      --green-s: rgba(45,134,83,0.09);
      --red: #c0392b;
      --red-s: rgba(192,57,43,0.09);
      --gold: #b07d2e;
      --gold-s: rgba(176,125,46,0.10);
      --terra: #b84c2a;
      --terra-s: rgba(184,76,42,0.09);
      --purple: #6b4fbb;
      --shadow: rgba(0,0,0,0.06);

      /* Safe areas */
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    /* ── App shell ─────────────────────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--sat) + 14px) 16px 0;
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .app-title { font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
    .app-sub { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .level-badge {
      background: var(--blue-s);
      border: 1px solid var(--blue);
      border-radius: 9px;
      padding: 5px 11px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    .xp-display { text-align: right; }
    .xp-level { font-size: 11px; color: var(--gold); font-variant-numeric: tabular-nums; }
    .xp-val { font-size: 12px; color: var(--ink-mid); font-variant-numeric: tabular-nums; }
    .xp-bar-track { background: var(--bg-alt); border-radius: 3px; height: 4px; margin-bottom: 10px; }
    .xp-bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* ── Tab bar ───────────────────────────────────────────────────── */
    #tabbar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    #tabbar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 0 0 auto;
      min-width: 60px;
      padding: 11px 10px;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      position: relative;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-badge {
      position: absolute;
      top: 6px; right: 4px;
      background: var(--terra);
      color: #fff;
      border-radius: 8px;
      font-size: 9px;
      padding: 1px 4px;
      font-weight: 600;
      line-height: 1.4;
    }

    /* ── Scroll content ────────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(var(--sab) + 20px);
      scrollbar-width: none;
    }
    #content::-webkit-scrollbar { display: none; }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 16px;
      box-shadow: 0 2px 14px var(--shadow);
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .card-sm {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      box-shadow: 0 1px 6px var(--shadow);
      margin-bottom: 9px;
    }

    /* ── Chips ─────────────────────────────────────────────────────── */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 400;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip.active-blue { border-color: var(--blue); background: var(--blue-s); color: var(--blue); font-weight: 600; }
    .chip.active-terra { border-color: var(--terra); background: var(--terra-s); color: var(--terra); font-weight: 600; }
    .chip.active-gold { border-color: var(--gold); background: var(--gold-s); color: var(--gold); font-weight: 600; }
    .chip.active-purple { border-color: var(--purple); background: rgba(107,79,187,0.09); color: var(--purple); font-weight: 600; }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn-primary {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 11px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn-primary:disabled { background: var(--subtle); color: var(--muted); }
    .btn-primary:active { opacity: 0.85; }
    .btn-ghost {
      background: transparent;
      color: var(--ink-mid);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
    }

    /* ── Feedback ──────────────────────────────────────────────────── */
    .feedback {
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 12px;
      animation: fadeUp 0.25s ease;
    }
    .feedback.correct { background: var(--green-s); border: 1px solid var(--green); }
    .feedback.wrong   { background: var(--red-s);   border: 1px solid var(--red); }
    .feedback-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .feedback.correct .feedback-title { color: var(--green); }
    .feedback.wrong   .feedback-title { color: var(--red); }
    .feedback-body { font-size: 13px; color: var(--ink-mid); line-height: 1.65; }

    /* ── Meta row ──────────────────────────────────────────────────── */
    .meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .meta-tag {
      font-size: 11px;
      background: rgba(0,0,0,0.04);
      padding: 2px 8px;
      border-radius: 6px;
      letter-spacing: 0.2px;
    }
    .meta-xp { margin-left: auto; font-size: 11px; color: var(--gold); font-variant-numeric: tabular-nums; }

    /* ── Question sentence ─────────────────────────────────────────── */
    .q-sentence { font-size: 20px; font-weight: 500; line-height: 1.65; color: var(--ink); margin-bottom: 6px; }
    .q-hint-row { min-height: 22px; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .hint-btn {
      display: inline-block;
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 2px 10px;
      font-size: 12px;
      color: var(--muted);
      background: none;
    }

    /* ── Fill-blank input ──────────────────────────────────────────── */
    .fill-input {
      background: transparent;
      border: none;
      border-bottom: 2.5px solid var(--blue);
      color: var(--blue);
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      width: 100px;
      margin: 0 4px;
      padding: 0 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .fill-input.correct { border-color: var(--green); color: var(--green); }
    .fill-input.wrong   { border-color: var(--red);   color: var(--red); }

    /* ── Multiple choice grid ──────────────────────────────────────── */
    .mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 12px; }
    .mc-option {
      padding: 12px 10px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      transition: all 0.15s;
    }
    .mc-option:active { transform: scale(0.97); }
    .mc-option.correct { background: var(--green-s); border-color: var(--green); color: var(--green); }
    .mc-option.wrong   { background: var(--red-s);   border-color: var(--red);   color: var(--red); }
    .mc-option.disabled { cursor: default; }

    /* ── Textarea ──────────────────────────────────────────────────── */
    .q-textarea {
      width: 100%;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      margin-bottom: 12px;
    }

    /* ── Vocab card ────────────────────────────────────────────────── */
    .vocab-word { font-size: 30px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
    .vocab-example {
      padding: 11px 13px;
      background: var(--bg-alt);
      border-radius: 12px;
      margin-bottom: 16px;
      border-left: 3px solid var(--terra);
    }
    .vocab-example-es { font-size: 14px; font-style: italic; color: var(--ink); margin-bottom: 2px; }
    .vocab-example-en { font-size: 12px; color: var(--muted); }

    /* ── Section headers ───────────────────────────────────────────── */
    .section-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 3px; letter-spacing: -0.2px; }
    .section-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .label-caps { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 7px; }

    /* ── Search input ──────────────────────────────────────────────── */
    .search-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 15px;
      color: var(--ink);
      margin-bottom: 12px;
    }

    /* ── Stat grid ─────────────────────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; box-shadow: 0 1px 5px var(--shadow); }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .stat-val { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── Progress bar ──────────────────────────────────────────────── */
    .prog-track { background: var(--bg-alt); border-radius: 3px; height: 5px; }
    .prog-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s; }

    /* ── Verb table ────────────────────────────────────────────────── */
    .verb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .verb-cell { display: flex; gap: 8px; align-items: center; padding: 9px 11px; background: var(--bg-alt); border-radius: 10px; }
    .verb-pro { font-size: 11px; color: var(--muted); min-width: 48px; font-variant-numeric: tabular-nums; }
    .verb-form { font-size: 16px; font-weight: 600; color: var(--ink); }

    /* ── Dictionary entry ──────────────────────────────────────────── */
    .dict-entry { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.15s; }
    .dict-entry.open { box-shadow: 0 2px 12px var(--shadow); border-color: var(--border-mid); }
    .dict-header { display: flex; align-items: center; justify-content: space-between; }
    .dict-word-row { display: flex; align-items: baseline; gap: 9px; }
    .dict-word { font-size: 16px; font-weight: 600; color: var(--ink); }
    .dict-pos { font-size: 10px; padding: 1px 7px; border-radius: 5px; background: rgba(0,0,0,0.04); }
    .dict-key { font-size: 10px; color: var(--gold); }
    .dict-def { font-size: 14px; color: var(--ink-mid); margin-top: 2px; }
    .dict-expand { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .dict-ex-es { font-size: 14px; font-style: italic; color: var(--ink); margin-bottom: 2px; }
    .dict-ex-en { font-size: 12px; color: var(--muted); }
    .dict-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .dict-tag { font-size: 10px; color: var(--muted); background: var(--bg-alt); padding: 2px 7px; border-radius: 5px; }

    /* ── Andrew Barr ───────────────────────────────────────────────── */
    .ab-header { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
    .ab-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ab-notice { background: var(--blue-s); border: 1px solid var(--blue); border-radius: 12px; padding: 11px 13px; margin: 14px 0 18px; font-size: 13px; color: var(--blue); line-height: 1.6; }
    .note-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 9px; box-shadow: 0 1px 5px var(--shadow); display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .note-delete { background: none; border: none; color: var(--muted); font-size: 14px; flex-shrink: 0; padding: 2px 4px; }
    .note-phrase { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 2px; line-height: 1.45; }
    .note-meaning { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 5px; }
    .note-meta { display: flex; gap: 8px; align-items: center; }
    .note-cat { font-size: 10px; background: rgba(0,0,0,0.04); padding: 2px 7px; border-radius: 5px; }
    .note-date { font-size: 10px; color: var(--muted); }

    /* ── Daily progress dots ───────────────────────────────────────── */
    .daily-dots { display: flex; gap: 7px; margin-bottom: 18px; }
    .daily-dot { flex: 1; height: 5px; border-radius: 3px; background: var(--bg-alt); transition: background 0.3s; }
    .daily-dot.done { background: var(--green); }
    .daily-dot.current { background: var(--blue); }

    /* ── XP popup ──────────────────────────────────────────────────── */
    #xp-pop {
      position: fixed;
      top: 70px; right: 16px;
      background: var(--gold-s);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transform: translateY(-10px) scale(0.9);
      transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    #xp-pop.show { opacity: 1; transform: translateY(0) scale(1); }

    /* ── Level up overlay ──────────────────────────────────────────── */
    #lvlup-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      background: rgba(247,247,248,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #lvlup-overlay.show { opacity: 1; pointer-events: auto; }
    #lvlup-box {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 22px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      transform: scale(0.88);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    #lvlup-overlay.show #lvlup-box { transform: scale(1); }

    /* ── Level picker modal ────────────────────────────────────────── */
    #picker-overlay {
      position: fixed; inset: 0; z-index: 250;
      display: flex; align-items: center; justify-content: center;
      background: rgba(247,247,248,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #picker-overlay.show { opacity: 1; pointer-events: auto; }
    #picker-box {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 22px;
      padding: 26px 22px;
      width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .level-option {
      width: 100%;
      padding: 14px 15px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: var(--bg-alt);
      margin-bottom: 10px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .level-option.selected { border-color: var(--blue); background: var(--blue-s); }
    .level-option-name { font-size: 16px; font-weight: 600; color: var(--ink); }
    .level-option.selected .level-option-name { color: var(--blue); }
    .level-option-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Particles ─────────────────────────────────────────────────── */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: pop 1.1s ease-out forwards;
    }
    @keyframes pop {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--vx), calc(var(--vy) + 80px)) scale(0); opacity: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Empty state ───────────────────────────────────────────────── */
    .empty { color: var(--muted); text-align: center; padding: 40px 0; font-size: 14px; }

    /* ── Complete banner ───────────────────────────────────────────── */
    .complete-banner { text-align: center; padding: 40px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 2px 14px var(--shadow); }

    /* ── Next row ──────────────────────────────────────────────────── */
    .next-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .streak-label { font-size: 13px; font-weight: 600; color: var(--gold); }
  </style>
</head>
<body>

<div id="xp-pop">+0 XP</div>

<div id="lvlup-overlay">
  <div id="lvlup-box">
    <div style="font-size:44px;margin-bottom:10px">🏆</div>
    <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Level Up</div>
    <div id="lvlup-num" style="font-size:40px;font-weight:700;color:var(--gold)">Level 2</div>
    <div style="font-size:14px;color:var(--muted);margin-top:8px">¡Fantástico! Keep going.</div>
  </div>
</div>

<div id="picker-overlay">
  <div id="picker-box">
    <div style="font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px">Choose Your Level</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:18px">Questions adapt to your level.</div>
    <button class="level-option" data-level="A1" onclick="selectLevel('A1')">
      <div class="level-option-name">A1 ✓</div>
      <div class="level-option-desc">Beginner · Greetings, numbers, present tense</div>

function bank() { return S.cefr === "A1" ? QA1 : QA2; }
function getPool(mode, tense) {
  let qs = bank().filter(q => q.type === mode);
  if (tense !== "Mixed") qs = qs.filter(q => q.tense === tense || q.type === "vocabulary");
  return qs.length ? qs : bank().filter(q => q.type === mode);
}
function weightedPick(qs, exclude) {
  const cs = qs.filter(q => q.id !== exclude?.id);
  if (!cs.length) return qs[0];
  const ws = cs.map(q => 1 + (S.wrongCounts[q.id]||0)*2);
  const tot = ws.reduce((a,b)=>a+b,0);
  let r = Math.random()*tot;
  for (let i=0; i<cs.length; i++) { r -= ws[i]; if (r<=0) return cs[i]; }
  return cs[cs.length-1];
}
function getDailyQs() {
  const day = Math.floor(Date.now()/86400000);
  return [...bank()].sort((a,b)=>((day*2654435761+a.id.charCodeAt(0))>>>0)-((day*2654435761+b.id.charCodeAt(0))>>>0)).slice(0,6);
}
function xpToLevel(xp) {
  const lvls=[0,50,120,220,350,520,740,1020,1380,1840,2420];
  let l=1; for(let i=1;i<lvls.length;i++){if(xp>=lvls[i])l=i+1;else break;}
  const c=lvls[Math.min(l-1,lvls.length-1)]||0, n=lvls[Math.min(l,lvls.length-1)]||lvls[lvls.length-1];
  return {level:l,current:c,next:n,progress:n>c?(xp-c)/(n-c):1};
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function normAnswer(s) { return s.trim().toLowerCase().replace(/[¿¡.,!?]/g,"").replace(/\s+/g," "); }

function updateHeader() {

  document.getElementById("lvl-display").textContent = `LVL ${lv.level}`;
  document.getElementById("xp-display").textContent = `${S.xp} XP${S.streak>=3?" · 🔥"+S.streak:""}`;
  document.getElementById("xp-bar").style.width = (lv.progress*100)+"%";
  document.getElementById("level-badge-btn").textContent = S.cefr+" ▾";
  const dq = getDailyQs();
  const pending = dq.filter(q=>!S.dailyDone.includes(q.id)).length;
  const badge = document.getElementById("daily-badge");
  if (pending > 0) { badge.textContent = pending; badge.style.display=""; }
  else badge.style.display = "none";

function showXPPop(n) {
  const el = document.getElementById("xp-pop");
  el.textContent = "+"+n+" XP";
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 1800);
}

let lvlupTimer;
function showLevelUp(level) {
  document.getElementById("lvlup-num").textContent = "Level "+level;
  const ov = document.getElementById("lvlup-overlay");
  ov.classList.add("show");
  clearTimeout(lvlupTimer);
  lvlupTimer = setTimeout(()=>ov.classList.remove("show"), 2600);
}

function spawnParticles(container) {
  const colors = ["#b07d2e","#b84c2a","#2d8653","#f4a642","#2264b8","#6b4fbb"];
  for (let i=0; i<14; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const vx = (Math.random()-.5)*280, vy = -(Math.random()*200+100);
    p.style.cssText = `left:${44+Math.random()*12}%;top:50%;width:${Math.random()*7+3}px;height:${Math.random()*7+3}px;background:${colors[i%colors.length]};--vx:${vx}px;--vy:${vy}px;`;
    container.appendChild(p);
    setTimeout(()=>p.remove(), 1200);
  }
}

function awardXP(n, container) {
  const prev = xpToLevel(S.xp);
  S.xp += n;
  const next = xpToLevel(S.xp);
  saveState(); updateHeader();
  showXPPop(n);
  if (next.level > prev.level) setTimeout(()=>showLevelUp(next.level), 400);
  if (container) spawnParticles(container);
}

function handleAnswer(correct, q, isDaily=false) {
  const gained = correct ? (S.hintUsed ? Math.max(q.xp-5,1) : q.xp) : 2;
  const ns = correct ? S.streak+1 : 0;
  S.streak = ns; S.bestStreak = Math.max(S.bestStreak, ns);
  S.totAns++; if (correct) S.totCor++;
  const tk = q.tense||"Vocabulary";
  S.byTense[tk] = S.byTense[tk]||{total:0,correct:0};
  S.byTense[tk].total++; if (correct) S.byTense[tk].correct++;
  if (!correct) S.wrongCounts[q.id] = (S.wrongCounts[q.id]||0)+1;
  if (isDaily) S.dailyDone.push(q.id);
  S.answered = true;
  saveState(); updateHeader();
  const card = document.querySelector(".q-card");
  awardXP(gained, correct ? card : null);
  renderQuestion(q, isDaily);
}

// ─── QUESTION RENDERING ──────────────────────────────────────────────
function metaHTML(q) {
  const tc = {Present:"var(--blue)",Preterite:"var(--terra)",Imperfect:"var(--gold)",Future:"var(--green)",Vocabulary:"var(--purple)"}[q.tense||"Vocabulary"]||"var(--muted)";

    <span class="meta-xp">${q.xp} XP</span>

}

function feedbackHTML(correct, answer, explanation) {
  return `<div class="feedback ${correct?"correct":"wrong"}">
    <div class="feedback-title">${correct?"¡Correcto! ✓":"Answer: "+esc(answer)}</div>
    <div class="feedback-body">${esc(explanation)}</div>
  </div>`;
}

function renderQuestionCard(q, isDaily=false) {
  let inner = "";
  if (q.type === "fill-blank") inner = renderFillBlank(q, isDaily);
  else if (q.type === "multiple-choice") inner = renderMultiChoice(q, isDaily);
  else if (q.type === "translation") inner = renderTranslation(q, isDaily);
  else if (q.type === "vocabulary") inner = renderVocab(q, isDaily);
  return `<div class="card q-card">${inner}</div>`;
}

function renderFillBlank(q, isDaily) {
  const parts = q.sentence_es.split("___");
  const done = S.answered;
  const isCorrect = done && normAnswer(document.getElementById("fill-in")?.value||"") === normAnswer(q.answer);
  return `
    ${metaHTML(q)}
    <div class="q-sentence">${esc(parts[0])}<input id="fill-in" class="fill-input ${done?(isCorrect?"correct":"wrong"):""}" placeholder="···" ${done?"disabled":""} oninput="" onkeydown="if(event.key==='Enter')checkFill('${esc(q.id)}',${isDaily})"/>${esc(parts[1]||"")}</div>

    </div>
    ${!done ? `<button class="btn-primary" onclick="checkFill('${esc(q.id)}',${isDaily})">Check Answer</button>` : feedbackHTML(isCorrect, q.answer, q.explanation)}
  `;
}

let abSearch="", abFilter="All";
const AB_CATS=["Phrase","Idiom","Vocab","Grammar","Tip"];
const AB_CAT_COLOR={Phrase:"var(--blue)",Idiom:"var(--terra)",Vocab:"var(--green)",Grammar:"var(--gold)",Tip:"var(--purple)"};
let abForm={phrase:"",meaning:"",notes:"",category:"Phrase"};

function renderAndrew(c) {
  const items = loadBarr();
  const filtered = items.filter(i=>{
    const ms=!abSearch||i.phrase.toLowerCase().includes(abSearch.toLowerCase())||i.meaning.toLowerCase().includes(abSearch.toLowerCase());
    const mc=abFilter==="All"||i.category===abFilter;
    return ms&&mc;
  });
  c.innerHTML = `
    <div class="ab-header">
      <div class="ab-icon">✉️</div>
      <div>
        <div class="section-title">Andrew Barr</div>
        <div style="font-size:12px;color:var(--muted)">Vocabulary & phrases from your lessons</div>
      </div>
    </div>
    <div class="ab-notice">
      📬 <strong>Auto-import:</strong> Reconnect Microsoft 365 in the connectors menu and I'll pull Andrew's emails in automatically. Add entries manually below in the meantime.
    </div>
    <div class="card">
      <div class="label-caps">Add Content</div>
      <input class="search-input" style="margin-bottom:8px" placeholder="Spanish word or phrase…" value="${esc(abForm.phrase)}" oninput="abForm.phrase=this.value">
      <input class="search-input" style="margin-bottom:8px" placeholder="English meaning…" value="${esc(abForm.meaning)}" oninput="abForm.meaning=this.value">
      <textarea class="q-textarea" rows="2" placeholder="Andrew's notes or context (optional)…" oninput="abForm.notes=this.value">${esc(abForm.notes)}</textarea>
      <div class="chips">
        ${AB_CATS.map(cat=>`<button class="chip ${abForm.category===cat?"active-blue":""}" style="${abForm.category===cat?"border-color:"+AB_CAT_COLOR[cat]+";color:"+AB_CAT_COLOR[cat]:""}" onclick="abForm.category='${cat}';renderAndrew(content())">${cat}</button>`).join("")}
      </div>
      <button class="btn-primary" ${!abForm.phrase.trim()?"disabled":""} onclick="addBarrEntry()">Save Entry</button>
    </div>
    ${items.length>0?`
      <input class="search-input" placeholder="🔍  Search…" value="${esc(abSearch)}" oninput="abSearch=this.value;renderAndrew(content())">
      <div class="chips">
        ${["All",...AB_CATS].map(c=>`<button class="chip ${abFilter===c?"active-blue":""}" onclick="abFilter='${c}';renderAndrew(content())">${c}</button>`).join("")}
      </div>
    `:""}
    ${filtered.length===0?`<div class="empty">${items.length===0?"No entries yet — add Andrew's phrases above or reconnect M365.":"No entries match."}</div>`:""}
    ${filtered.map(it=>`
      <div class="note-card">
        <div style="flex:1">
          <div class="note-phrase">${esc(it.phrase)}</div>
          ${it.meaning?`<div class="note-meaning">${esc(it.meaning)}</div>`:""}
          ${it.notes?`<div style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:5px;line-height:1.5">${esc(it.notes)}</div>`:""}
          <div class="note-meta">
            <span class="note-cat" style="color:${AB_CAT_COLOR[it.category]||"var(--muted)"}">${esc(it.category)}</span>
            <span class="note-date">${esc(it.date)}</span>
          </div>
        </div>
        <button class="note-delete" onclick="deleteBarr(${it.id})">✕</button>
      </div>`).join("")}
  `;
}
function addBarrEntry() {
  if (!abForm.phrase.trim()) return;
  const items = loadBarr();
  items.unshift({id:Date.now(),phrase:abForm.phrase.trim(),meaning:abForm.meaning.trim(),notes:abForm.notes.trim(),category:abForm.category,date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})});
  saveBarr(items);
  abForm={phrase:"",meaning:"",notes:"",category:"Phrase"};
  renderAndrew(content());
}
function deleteBarr(id) { saveBarr(loadBarr().filter(i=>i.id!==id)); renderAndrew(content()); }

// ─── VERBS TAB ───────────────────────────────────────────────────────
let verbSel=0, verbTense="Present";
function renderVerbs(c) {
  const v = VERBS[verbSel];
  c.innerHTML = `
    <div class="section-title">Conjugation Tables</div>
    <div class="section-sub">Tap a verb to see all forms.</div>
    <div class="chips">
      ${VERBS.map((vb,i)=>`<button class="chip ${verbSel===i?"active-blue":""}" onclick="verbSel=${i};renderVerbs(content())">${vb.verb}</button>`).join("")}
    </div>
    <div class="card">
      <div style="margin-bottom:12px">
        <div style="font-size:22px;font-weight:700;color:var(--blue)">${esc(v.verb)}</div>
        <div style="font-size:13px;color:var(--muted);font-style:italic">${esc(v.meaning)}</div>
      </div>
      <div class="chips">
        ${Object.keys(v.forms).map(t=>`<button class="chip ${verbTense===t?"active-terra":""}" onclick="verbTense='${t}';renderVerbs(content())">${t}</button>`).join("")}
      </div>
      <div class="verb-grid">
        ${(v.forms[verbTense]||[]).map((form,i)=>`<div class="verb-cell"><span class="verb-pro">${PRONOUNS[i]}</span><span class="verb-form">${esc(form)}</span></div>`).join("")}
      </div>
    </div>
  `;
}

// ─── NOTES TAB ───────────────────────────────────────────────────────
let notesSearch="", noteTag="Overheard", noteEs="", noteEn="";
const NOTE_TAGS=["Overheard","Phrase","Slang","Grammar","Vocab"];
const NOTE_COLORS={Overheard:"var(--purple)",Phrase:"var(--blue)",Slang:"var(--terra)",Grammar:"var(--gold)",Vocab:"var(--green)"};
function renderNotes(c) {
  const notes = loadNotes();
  const filtered = notes.filter(n=>!notesSearch||n.es.toLowerCase().includes(notesSearch.toLowerCase())||n.en.toLowerCase().includes(notesSearch.toLowerCase()));
  c.innerHTML = `
    <div class="section-title">My Notes</div>
    <div class="section-sub">Sentences you pick up from Spanish speakers around you.</div>
    <div class="card">
      <div class="label-caps">New Note</div>
      <input class="search-input" style="margin-bottom:8px" placeholder="Spanish sentence…" value="${esc(noteEs)}" oninput="noteEs=this.value">
      <input class="search-input" style="margin-bottom:10px" placeholder="English meaning (optional)…" value="${esc(noteEn)}" oninput="noteEn=this.value">
      <div class="chips">
        ${NOTE_TAGS.map(t=>`<button class="chip ${noteTag===t?"active-blue":""}" style="${noteTag===t?"border-color:"+NOTE_COLORS[t]+";color:"+NOTE_COLORS[t]:""}" onclick="noteTag='${t}';renderNotes(content())">${t}</button>`).join("")}
      </div>
      <button class="btn-primary" ${!noteEs.trim()?"disabled":""} onclick="addNote()">Save Note</button>
    </div>
    ${notes.length>0?`<input class="search-input" placeholder="🔍  Search notes…" value="${esc(notesSearch)}" oninput="notesSearch=this.value;renderNotes(content())">`:""}
    ${filtered.length===0?`<div class="empty">${notes.length===0?"No notes yet — save your first sentence above!":"No notes match."}</div>`:""}
    ${filtered.map(n=>`
      <div class="note-card">
        <div style="flex:1">
          <div class="note-phrase">${esc(n.es)}</div>
          ${n.en?`<div class="note-meaning">${esc(n.en)}</div>`:""}
          <div class="note-meta">
            <span class="note-cat" style="color:${NOTE_COLORS[n.tag]||"var(--muted)"}">${esc(n.tag)}</span>
            <span class="note-date">${esc(n.date)}</span>
          </div>
        </div>
        <button class="note-delete" onclick="deleteNote(${n.id})">✕</button>
      </div>`).join("")}
  `;
}
function addNote() {
  if(!noteEs.trim())return;
  const notes=loadNotes();
  notes.unshift({id:Date.now(),es:noteEs.trim(),en:noteEn.trim(),tag:noteTag,date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})});
  saveNotes(notes); noteEs=""; noteEn=""; renderNotes(content());
}
function deleteNote(id){saveNotes(loadNotes().filter(n=>n.id!==id));renderNotes(content());}

// ─── STATS TAB ───────────────────────────────────────────────────────
function renderStats(c) {
  const lv=xpToLevel(S.xp); const acc=S.totAns?Math.round(S.totCor/S.totAns*100):0;
  c.innerHTML = `
    <div class="section-title" style="margin-bottom:18px">Your Progress</div>
    ${S.totAns===0?`<div class="empty">Answer some questions to see your stats!</div>`:` 
      <div class="stat-grid">
        ${[{l:"Level",v:lv.level,c:"var(--gold)"},{l:"Total XP",v:S.xp,c:"var(--terra)"},{l:"Accuracy",v:acc+"%",c:acc>=75?"var(--green)":acc>=50?"var(--gold)":"var(--red)"},{l:"Best Streak",v:"🔥 "+S.bestStreak,c:"var(--gold)"},{l:"Answered",v:S.totAns,c:"var(--blue)"},{l:"Correct",v:S.totCor,c:"var(--green)"}].map(({l,v,c})=>`
          <div class="stat-card"><div class="stat-label">${l}</div><div class="stat-val" style="color:${c}">${v}</div></div>`).join("")}
      </div>
      <div class="card-sm" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px">
          <span style="font-size:13px">Level ${lv.level} → ${lv.level+1}</span>
          <span style="font-size:12px;color:var(--gold);font-variant-numeric:tabular-nums">${S.xp-lv.current}/${lv.next-lv.current} XP</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="background:var(--blue);width:${lv.progress*100}%"></div></div>
      </div>
      ${Object.entries(S.byTense).map(([t,d])=>`
        <div class="card-sm">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:13px">${esc(t)}</span>
            <span style="font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums">${d.correct}/${d.total} · ${Math.round(d.correct/d.total*100)}%</span>
          </div>
          <div class="prog-track"><div class="prog-fill" style="width:${d.total?d.correct/d.total*100:0}%"></div></div>
        </div>`).join("")}
      <div style="margin-top:18px">
        <button class="btn-ghost" onclick="resetProgress()">Reset progress</button>
      </div>
    `}
  `;
}
function resetProgress(){S.xp=0;S.streak=0;S.bestStreak=0;S.totAns=0;S.totCor=0;S.byTense={};S.wrongCounts={};S.dailyDone=[];saveState();updateHeader();renderStats(content());}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
loadState();
updateHeader();
// Init picker state
document.querySelectorAll(".level-option").forEach(b=>{
  b.classList.toggle("selected",b.dataset.level===S.cefr);
  b.querySelector(".level-option-name").textContent=b.dataset.level+(b.dataset.level===S.cefr?" ✓":"");
});
render();

// Close picker on backdrop tap
document.getElementById("picker-overlay").addEventListener("click",function(e){if(e.target===this)closePicker();});
// Close lvlup on tap
document.getElementById("lvlup-overlay").addEventListener("click",function(){this.classList.remove("show");});

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'mi-tutor-v1';
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.add('/'))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => { caches.open(CACHE).then(c=>c.put(e.request,res.clone())); return res; }).catch(()=>caches.match('/')))));
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
